<script>
  const WA_URL = 'https://wa.me/5566996829009?text=Gostaria+de+mais+informa%C3%A7%C3%B5es+da+Ch%C3%A1cara+Nanci';

  // GTM dataLayer — generate_lead na página de obrigado
  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({
    event: 'generate_lead',
    form_name: 'Lead Chácara Nanci',
    page: 'obrigado',
  });
  const CIRCUMFERENCE = 2 * Math.PI * 28; // 175.93
  const ring = document.getElementById('ring');
  const num = document.getElementById('num');
  const sec = document.getElementById('sec');
  const plural = document.getElementById('plural');

  ring.style.strokeDasharray = CIRCUMFERENCE;
  ring.style.strokeDashoffset = 0;

  let count = 3;

  function tick() {
    count--;
    num.textContent = count;
    sec.textContent = count;
    plural.textContent = count === 1 ? '' : 's';
    ring.style.strokeDashoffset = CIRCUMFERENCE * ((3 - count) / 3);

    if (count <= 0) {
      window.location.href = WA_URL;
    }
  }

  setTimeout(() => {
    ring.style.strokeDashoffset = CIRCUMFERENCE * (1 / 3);
    const interval = setInterval(() => {
      tick();
      if (count <= 0) clearInterval(interval);
    }, 1000);
  }, 1000);
</script>
